<html>
<head>
  <title>Ishanify your Text</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <div id="title-bar">
  <h1 class="title">Welcome to Text-Ishanify.com</h1>
  <p class="title">home to all your Ishanifying needs</p>
</div>

    <input type="text" id="userInput"></input>
    <button id="submitter">Submit</button>
    <div id="output"></div>
    <script>
        var submitted = false;
        var IshanifiedText = "";
        document.getElementById("submitter").addEventListener("click", function(){
            submitted = true;
        });

        setInterval(function() {
            // this is the closest you get to an infinite loop in JavaScript
            if ( submitted ) {
                submitted = false;
                // document.write causes silly problems, do this instead (or better yet, use a library like jQuery to do this stuff for you)
                var o = document.getElementById("output"), v = document.getElementById("userInput").value;

                //Ishanifying Method
                  var charArray = v.split('');
                  var spaces = true;
                  while (spaces) {
                    var spaceIndex = charArray.indexOf(" ");

                    if (spaceIndex == -1) {
                      spaces = false;
                    } else {
                    charArray[spaceIndex] = "DAD";
                    }
                  }

                var IshanifiedText = v.substring();

                if (o.textContent !== undefined) {
                    o.textContent = charArray.join("");
                } else {
                    o.innerText = charArray.join("");
                }
            }
        }, 500);
    </script>
</body>
</html>
